name: Generate Dataset

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      topic_hung:
        description: 'Topic (python/sql/philosophy/architecture/swift)'
        default: 'python'
      count:
        description: 'Số examples'
        default: '100'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-hung:
    name: "Hung — ${{ github.event.inputs.topic_hung || 'python' }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai

      - name: Generate dataset
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_KEY_HUNGDAI }}
        run: |
          python generate_gemini.py \
            --worker hung \
            --topic ${{ github.event.inputs.topic_hung || 'python' }} \
            --count ${{ github.event.inputs.count || '100' }} \
            --batch-size 10 \
            --delay 4

      - name: Commit & push
        run: | 
          git config user.name "TuminhAGI Bot"
          git config user.email "bot@tuminh.ai"
          git stash --include-untracked
          git pull --rebase origin main
          git stash pop || true
          git add finetune/datasets/
          git diff --staged --quiet || git commit -m " [hung] add ${{ github.event.inputs.topic_hung || 'python' }} examples"
          git push
