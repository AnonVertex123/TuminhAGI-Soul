# .github/workflows/crawl_code.yml
# TuminhAGI — Tự động cào code thật từ GitHub
#
# Setup:
#   GitHub repo → Settings → Secrets → Actions → New secret:
#   CRWL_TOKEN = GitHub Personal Access Token (PAT)

name: Crawl Production Code

on:
  schedule:
    # Chạy mỗi 12 tiếng: 12h trưa và 12h đêm (UTC+7)
    - cron: '0 5,17 * * *'
  workflow_dispatch:
    inputs:
      language:
        description: 'Ngôn ngữ cần cào (python/swift/sql/javascript)'
        default: 'swift'
      count:
        description: 'Số lượng examples mục tiêu'
        default: '200'

jobs:
  crawl:
    name: "Crawl ${{ github.event.inputs.language || 'python' }}"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Crawler
        env:
          GITHUB_TOKEN: ${{ secrets.CRWL_TOKEN }}
        run: |
          python github_crawler.py \
            --language ${{ github.event.inputs.language || 'python' }} \
            --count ${{ github.event.inputs.count || '50' }} \
            --worker github_bot

      - name: Commit & push
        run: |
          git config user.name "TuminhAGI Crawler"
          git config user.email "crawler@tuminh.ai"
          git stash --include-untracked
          git pull --rebase origin main
          git stash pop || true
          git add finetune/datasets/
          git diff --staged --quiet || git commit -m "🤖 [crawler] add real-world examples"
          git push
        shell: /usr/bin/bash -e {0}
