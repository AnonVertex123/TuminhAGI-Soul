name: Crawl Production Code

on:
  workflow_dispatch:
    inputs:
      language:
        default: 'swift'
      count:
        default: '200'

jobs:
  crawl:
    name: "Crawl swift"
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Run Crawler
        env:
          GITHUB_TOKEN: ${{ secrets.CRWL_TOKEN }}
        shell: powershell
        run: |
          python github_crawler.py `
            --language ${{ github.event.inputs.language || 'swift' }} `
            --count ${{ github.event.inputs.count || '200' }} `
            --token "${{ secrets.CRWL_TOKEN }}" `
            --worker github_bot

      - name: Commit & push
        shell: powershell
        run: |
          git config user.name "TuminhAGI Crawler"
          git config user.email "crawler@tuminh.ai"
          git add finetune/datasets/
          git diff --staged --quiet
          if ($LastExitCode -ne 0) {
            git commit -m "🤖 [crawler] add real-world examples"
            git push
          }