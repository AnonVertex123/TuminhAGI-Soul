name: TuminhAGI Auto-Learning Pipeline

on:
  schedule:
    # 2:00 AM Vietnam (UTC+7) = 19:00 UTC
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  auto_learn:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests google-generativeai datasets
          pip install sentence-transformers pandas tqdm

      - name: Step 1 — Crawl GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/crawl_github.py

      - name: Step 2 — Generate dataset with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_dataset.py

      - name: Step 3 — Filter + Dedup
        run: python scripts/filter_dedup.py

      - name: Commit dataset
        shell: bash -e {0}
        run: |
          git config user.name "TuminhAGI Bot"
          git config user.email "bot@tuminhagi.ai"
          git add data/filtered/
          git diff --staged --quiet || git commit -m "auto-learn: $(date +'%Y-%m-%d') — dataset batch"
          git push

